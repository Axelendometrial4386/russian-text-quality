# Optional glossary for check #5 (terminology drift).
#
# Place this file at .claude/russian-glossary.yml in your repo root.
# Mode A (auto-drift detection) is the default and runs regardless of this file.
# Mode B (this file) overrides auto-detection with explicit locks.
#
# Remove or comment out any section you do not need.

# Locked term map: source concept → the ONE canonical Russian term.
# The skill will flag any occurrence in ru locale files that uses a different
# Russian term for the same concept key.
terms:
  user: пользователь
  users: пользователи
  cart: корзина
  checkout: оформление заказа
  login: войти
  logout: выйти
  signup: регистрация
  password: пароль
  email: электронная почта   # or "email" if your brand prefers the loanword
  settings: настройки
  profile: профиль
  message: сообщение
  notification: уведомление
  error: ошибка
  warning: предупреждение
  loading: загрузка
  save: сохранить
  cancel: отменить
  delete: удалить
  edit: редактировать
  confirm: подтвердить

# Forbidden variants: terms that must not appear in ru locale files at all.
# Useful for banning loanword slang that clashes with your brand voice.
forbidden:
  - юзер       # use "пользователь" instead
  - логин      # use "войти" or "имя пользователя" depending on context
  - залогиниться
  - залогинься
  - карт        # common misspelling of "карта" when wrong case is expected
  - емейл       # use "электронная почта" or "email"
  - имейл

# Synonym groups: terms that are linguistically valid but must not co-occur in
# the same project. The skill warns when >1 member of a group appears across
# your locale files.
synonym_groups:
  - [корзина, карт, карточка]
  - [войти, авторизоваться, залогиниться]
  - [пользователь, юзер, клиент]   # flag if two or more appear
  - [сохранить, запомнить]
  - [удалить, стереть, убрать]

# Notes on normalization:
# The v1 skill normalizes terms with a simple lowercase + suffix-stripping pass.
# Morphologically related forms (корзина, корзину, корзины, корзин) collapse
# to the same stem for comparison. This is approximate — if you see false
# positives or missed detections, please open an issue.
