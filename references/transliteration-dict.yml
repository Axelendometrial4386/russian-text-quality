# Phonotactic patterns (reference only; actual detection uses regex in the skill logic):
#   /shch/i      — щ
#   /[bdgklmnprstvz]zh/i  — ж
#   /^ya[a-z]/i  — я word-initial
#   /^yu[a-z]/i  — ю
#   /^yo[a-z]/i  — ё
#   /kh[aeiou]/i — х + vowel
