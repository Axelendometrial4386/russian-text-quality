# Transliteration dictionary for check #5 — transliterated identifiers.
#
# Low-confidence heuristic. Always emits Info severity, never Warning or Error.
# Detection fires only when all three tiers match: dictionary + phonotactic + file has Russian content.
#
# Source note: seeded from common Russian vocabulary in e-commerce / CRM / admin-panel domains
# where transliterated naming is most common in private code. The Phase 1 research pass could not
# find live GitHub permalinks for transliterated identifiers — that category has thin public
# evidence but is widely discussed as an antipattern in Russian dev communities (e.g. Habr QnA
# https://qna.habr.com/q/148717). Treat this dictionary as suggestion-only.
#
# Format:
#   <transliterated_token>: <suggested_english_equivalent>
#
# Tokens are matched case-insensitively against identifier parts after splitting on camelCase
# and snake_case boundaries. A match on ANY part triggers tier-1.

# ───── Users and auth ─────
polzovatel: user
polzovateli: users
klient: client
klienty: clients
sotrudnik: employee
sotrudniki: employees
admin: admin                # already English, exclude from trigger but keep for reference
administrator: administrator
vhod: login
